<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Path Blocker (AI Edition)</title>
    <link rel="stylesheet" href="popup.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-shield-halved"></i> Path Blocker</h1>
            <a href="setting.html" target="_blank" title="打开设置" id="settingsLink"><i class="fas fa-cog"></i></a>
        </header>

        <div class="content-wrapper">
            <section class="focus-score-section">
                <div class="score-display">
                    <span id="focusScore" class="score-value">--</span>
                    <span class="score-label">专注度</span>
                </div>
            </section>

            <section class="mode-section">
                <div class="mode-switcher">
                    <button class="mode-btn" id="modeHardcore" data-mode="hardcore" title="仅启用永久锁定列表"><i class="fas fa-lock"></i> 规则</button>
                    <button class="mode-btn" id="modeHybrid" data-mode="hybrid" title="优先永久锁定，再由AI守护"><i class="fas fa-wand-magic-sparkles"></i> 混合</button>
                    <button class="mode-btn" id="modeAi" data-mode="ai" title="仅由AI根据场景守护"><i class="fas fa-brain"></i> AI</button>
                </div>

                <div class="scene-control-area">
                    <div class="scene-select-group">
                        <i class="fas fa-theater-masks"></i>
                        <select id="sceneSelect"></select>
                    </div>
                    <div class="scene-actions">
                        <button id="addSceneBtn" title="新增场景"><i class="fas fa-plus"></i></button>
                        <button id="editSceneBtn" title="修改当前场景"><i class="fas fa-edit"></i></button>
                        <button id="deleteSceneBtn" title="删除当前场景"><i class="fas fa-trash-alt"></i></button>
                        <button id="exportSceneBtn" title="导出当前场景"><i class="fas fa-share-square"></i></button>
                        <button id="importSceneBtn" title="导入场景"><i class="fas fa-file-import"></i></button>
                    </div>
                </div>
            </section>

            <section class="add-section">
                <button id="addCurrentPageBtn" class="quick-add-btn">
                    <i class="fas fa-crosshairs"></i> 一键锁定当前页
                </button>
                
                <div class="input-grid">
                    <input type="text" id="nameInput" placeholder="规则名称">
                    <input type="text" id="pathInput" placeholder="URL 路径">
                    <select id="groupSelect"></select>
                </div>
                <button id="addBtn">
                    <i class="fas fa-plus-circle"></i> 永久锁定
                </button>
                <p class="note">
                    <i class="fas fa-exclamation-triangle"></i> 警告：规则一旦添加，将无法删除。
                </p>
            </section>

            <section class="list-section">
                <h2><i class="fas fa-list-ul"></i> 已锁定列表</h2>
                <div id="groupsContainer"></div>
            </section>
        </div>
    </div>

    <div id="scene-editor-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h2 id="modal-title">编辑场景</h2>
            <div class="modal-body">
                <div class="form-group">
                    <label for="scene-name-input">场景名称:</label>
                    <input type="text" id="scene-name-input" placeholder="例如：高效工作">
                </div>
                <div class="form-group">
                    <label>具体任务:</label>
                    <div id="tasks-container">
                        </div>
                    <button id="add-task-btn" class="add-task-button"><i class="fas fa-plus-circle"></i> 添加任务</button>
                </div>
            </div>
            <div class="modal-actions">
                <button id="cancel-scene-btn" class="modal-btn secondary">取消</button>
                <button id="save-scene-btn" class="modal-btn primary">保存</button>
            </div>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
